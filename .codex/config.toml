# Project-local MCP server configuration for Smart Trade.
# Keep secrets out of this file. Export required credentials in the local shell/session.

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@2.3.0"]

[mcp_servers.primeng]
command = "npm"
args = ["--prefix", ".devcontainer/mcp", "exec", "--", "primeng-mcp"]
